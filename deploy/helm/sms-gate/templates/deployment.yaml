apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sms-gate.fullname" . }}
  labels:
    {{- include "sms-gate.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # Only one instance should own the serial ports.
  selector:
    matchLabels:
      {{- include "sms-gate.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "sms-gate.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sms-gate.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (include "sms-gate.fullname" .) }}
                  key: {{ .Values.secretKey }}
          ports:
            - name: metrics
              containerPort: 9101
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/sms-gate
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/sms-gate
            {{- end }}
            {{- if .Values.usbDevices.enabled }}
            {{- range .Values.usbDevices.devices }}
            - name: usb-{{ . | replace "/" "-" | trimPrefix "-dev-" }}
              mountPath: {{ . }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sms-gate.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "sms-gate.fullname" . }}-data
        {{- end }}
        {{- if .Values.usbDevices.enabled }}
        {{- range .Values.usbDevices.devices }}
        - name: usb-{{ . | replace "/" "-" | trimPrefix "-dev-" }}
          hostPath:
            path: {{ . }}
            type: CharDevice
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
