apiVersion: v1
kind: Service
metadata:
  name: {{ include "sms-gate.fullname" . }}
  labels:
    {{- include "sms-gate.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "sms-gate.selectorLabels" . | nindent 4 }}
