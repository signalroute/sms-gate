version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - bodyclose
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - misspell
  settings:
    errcheck:
      check-blank: true
    staticcheck:
      checks: ["all", "-ST1000", "-ST1020"]
    govet:
      enable-all: true
      disable:
        - fieldalignment
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
