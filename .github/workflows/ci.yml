name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o sms-gate-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/gateway
      - uses: actions/upload-artifact@v7
        with:
          name: sms-gate-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sms-gate-${{ matrix.goos }}-${{ matrix.goarch }}
