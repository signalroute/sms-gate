name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o sms-gate-linux-amd64 ./cmd/gateway
          tar czf sms-gate-linux-amd64.tar.gz sms-gate-linux-amd64

      - name: Build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o sms-gate-linux-arm64 ./cmd/gateway
          tar czf sms-gate-linux-arm64.tar.gz sms-gate-linux-arm64

      - name: Build darwin/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o sms-gate-darwin-arm64 ./cmd/gateway
          tar czf sms-gate-darwin-arm64.tar.gz sms-gate-darwin-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            sms-gate-linux-amd64.tar.gz
            sms-gate-linux-arm64.tar.gz
            sms-gate-darwin-arm64.tar.gz
